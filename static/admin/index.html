<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>자신있나 파트너 가이드 관리자</title>
    <link rel="stylesheet" href="/admin/cms.css" />
  </head>
  <body class="is-booting">
    <section id="login-screen" class="login-screen" hidden>
      <form id="login-form" class="login-card">
        <img src="/img/logo.svg" alt="자신있나" />
        <h1>파트너 가이드 관리자</h1>
        <p>가이드 문서는 허가된 담당자만 수정할 수 있어요.</p>
        <label>
          <span>아이디</span>
          <input id="login-id" autocomplete="username" required />
        </label>
        <label>
          <span>비밀번호</span>
          <input id="login-password" type="password" autocomplete="current-password" required />
        </label>
        <button class="button button-primary" type="submit">로그인</button>
        <p id="login-error" class="error-text" role="alert"></p>
      </form>
    </section>

    <div id="app" class="cms-shell" hidden>
      <aside class="sidebar">
        <div class="brand">
          <img src="/img/logo.svg" alt="자신있나" />
          <strong>파트너 가이드 관리자</strong>
        </div>
        <label class="search">
          <span>문서 검색</span>
          <input id="search-input" type="search" placeholder="제목, 경로 검색" />
        </label>
        <nav id="document-list" class="document-list" aria-label="문서 목록"></nav>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <strong id="current-title">문서를 선택해 주세요</strong>
            <span id="current-path">실제 가이드 화면과 같은 구조로 문장만 수정해요.</span>
          </div>
          <div class="actions">
            <span id="save-state" class="state">대기 중</span>
            <a id="open-link" class="button button-secondary" href="/" target="_blank" rel="noreferrer">공개 보기</a>
            <button id="revert-button" class="button button-secondary" type="button" disabled>원본 복구</button>
            <button id="logout-button" class="button button-secondary" type="button">로그아웃</button>
            <button id="save-button" class="button button-primary" type="button" disabled>저장</button>
          </div>
        </header>

        <section class="visual-editor">
          <div class="preview-pane">
            <iframe id="preview-frame" title="가이드 미리보기"></iframe>
          </div>
          <aside class="text-pane">
            <div class="pane-head">
              <strong>화면 문장 편집</strong>
              <span id="text-count">문서를 열면 수정 가능한 문장이 표시돼요.</span>
            </div>
            <div id="field-list" class="field-list"></div>
          </aside>
        </section>
      </main>
    </div>

    <script src="/admin/cms.js" defer></script>
  </body>
</html>
