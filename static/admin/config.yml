backend:
  name: github
  repo: confidencelab19-max/jasinitna
  branch: main
  base_url: https://jasinitna-partner-guide.pages.dev
  auth_endpoint: api/auth

media_folder: static/img/uploads
public_folder: /img/uploads

site_url: https://jasinitna-partner-guide.pages.dev
display_url: https://jasinitna-partner-guide.pages.dev
logo_url: /img/logo.svg
locale: ko

editor:
  preview: true

collections:
  - name: start
    label: "01 한눈에 보는 사용법"
    label_singular: "한눈에 보는 사용법 문서"
    description: "입점 후 병원이 가장 먼저 해야 할 설정과 운영 흐름을 안내해요."
    folder: docs/start
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    summary: "{{title}}"
    sortable_fields: ["sidebar_position", "title", "reviewed_at", "commit_date"]
    view_filters:
      - label: "초안"
        field: draft
        pattern: true
      - label: "검토 필요"
        field: review_status
        pattern: "검토 필요"
    view_groups:
      - label: "검토 상태별 보기"
        field: review_status
      - label: "담당 부서별 보기"
        field: owner
    fields:
      - { label: "가이드 제목", name: title, widget: string, hint: "왼쪽 메뉴와 문서 상단에 보이는 제목입니다. 병원 담당자가 바로 이해할 수 있게 적어 주세요." }
      - { label: "목록 한 줄 설명", name: description, widget: text, required: false, hint: "홈 화면과 검색 결과에 보이는 설명입니다. 문서 내용을 한두 문장으로 요약하세요." }
      - { label: "메뉴 표시 순서", name: sidebar_position, widget: number, value_type: int, min: 1, required: false, hint: "숫자가 작을수록 메뉴 위쪽에 표시됩니다. 같은 카테고리 안에서만 적용됩니다." }
      - { label: "아직 공개하지 않기", name: draft, widget: boolean, default: false, required: false, hint: "켜두면 사이트에 공개되지 않습니다. 작성 중인 문서에만 사용하세요." }
      - label: "검토 상태"
        name: review_status
        widget: select
        default: "게시 가능"
        options: ["게시 가능", "검토 필요", "수정 중", "사용 중지"]
        hint: "저장 전 현재 상태를 골라 주세요. 공개 문서는 보통 게시 가능으로 둡니다."
        required: false
      - { label: "내용 담당 부서", name: owner, widget: string, required: false, hint: "나중에 누가 확인해야 하는 문서인지 알 수 있게 입력해요." }
      - { label: "마지막 확인일", name: reviewed_at, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, required: false, hint: "내용을 마지막으로 확인한 날짜입니다." }
      - { label: "다음 확인 예정일", name: review_due_at, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, required: false, hint: "정기적으로 다시 봐야 하는 문서에만 입력하세요." }
      - { label: "본문 내용", name: body, widget: markdown, hint: "병원이 실제로 읽는 내용입니다. 큰 제목은 ##, 소제목은 ###, 표는 | 구분 | 내용 | 형식으로 작성하세요. 개인정보와 확인되지 않은 수치는 넣지 마세요." }

